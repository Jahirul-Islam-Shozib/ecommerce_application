<div class="bg-white rounded-md p-4 mb-4 top-brands-container">
  <h2 class="text-xl font-bold mb-4 border-b pb-2">Top Brands</h2>
  <ul class="space-y-4">
    <li
      *ngFor="let brand of brands"
      class="flex items-center gap-4 p-2 w-100 h-14 rounded-md cursor-pointer brand-item"
    >
      <img [src]="brand.image" [alt]="brand.name" class="brand-img" />
      <span>{{ brand.name }}</span>
    </li>
  </ul>
</div>
